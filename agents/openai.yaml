interface:
  display_name: "BetterRef"
  short_description: "Turn PRDs, visual references, and 3D model refs into measurable QA loops."
  default_prompt: "Use BetterRef to match the provided reference image or PRD as closely as possible. For PRD PDFs, use betterref-prd to generate requirements, checklist, runbook, and region config. Use browser or Chrome MCP evidence to capture the right state and DOM boxes when available. If Chrome MCP tools are not exposed, use betterref-chrome against Chrome CDP. Run BetterRef CLI diff checks with perceptual scoring, size normalization, and region reports before reporting the visual verdict."
